functional_tests:
  - id: Q01
    category: "Consultas simples"
    question: "¿Cuántas transacciones hay registradas en la base de datos?"
    expected_validation: "El resultado debe devolver el conteo total de registros de la tabla de transacciones."
    status: "pending"

  - id: Q02
    category: "Consultas simples"
    question: "Muéstrame las 10 transacciones con mayor importe."
    expected_validation: "El resultado debe devolver 10 transacciones ordenadas de mayor a menor importe."
    status: "pending"

  - id: Q03
    category: "Consultas simples"
    question: "¿Cuántos usuarios hay en la base de datos?"
    expected_validation: "El resultado debe devolver el conteo total de usuarios."
    status: "pending"

  - id: Q04
    category: "Consultas simples"
    question: "¿Cuántas tarjetas están registradas?"
    expected_validation: "El resultado debe devolver el conteo total de tarjetas."
    status: "pending"

  - id: Q05
    category: "Agregaciones"
    question: "¿Cuál es el importe medio de las transacciones?"
    expected_validation: "El resultado debe devolver el promedio del campo de importe de las transacciones."
    status: "pending"

  - id: Q06
    category: "Agregaciones"
    question: "¿Cuál es el importe total de todas las transacciones?"
    expected_validation: "El resultado debe devolver la suma total de los importes de las transacciones."
    status: "pending"

  - id: Q07
    category: "Agregaciones"
    question: "¿Cuál es la transacción de mayor importe?"
    expected_validation: "El resultado debe identificar la transacción con el importe máximo."
    status: "pending"

  - id: Q08
    category: "Agregaciones"
    question: "Agrupa las transacciones por tipo de uso del chip."
    expected_validation: "El resultado debe agrupar las transacciones por el campo de uso del chip."
    status: "pending"

  - id: Q09
    category: "Relaciones entre entidades"
    question: "¿Qué clientes tienen más tarjetas asociadas?"
    expected_validation: "El resultado debe relacionar usuarios y tarjetas, agrupando por cliente."
    status: "pending"

  - id: Q10
    category: "Relaciones entre entidades"
    question: "¿Qué tipos de tarjeta acumulan mayor volumen de transacciones?"
    expected_validation: "El resultado debe relacionar tarjetas y transacciones, agrupando por tipo de tarjeta."
    status: "pending"

  - id: Q11
    category: "Relaciones entre entidades"
    question: "Agrupa las transacciones por categoría MCC."
    expected_validation: "El resultado debe agrupar las transacciones por código o descripción MCC."
    status: "pending"

  - id: Q12
    category: "Relaciones entre entidades"
    question: "¿Qué categorías de comercio tienen mayor importe total transaccionado?"
    expected_validation: "El resultado debe agrupar por categoría de comercio y ordenar por importe total."
    status: "pending"

  - id: Q13
    category: "Análisis de fraude"
    question: "¿Cuántas transacciones fraudulentas hay?"
    expected_validation: "El resultado debe contar las transacciones marcadas como fraudulentas."
    status: "pending"

  - id: Q14
    category: "Análisis de fraude"
    question: "¿Qué porcentaje de transacciones son fraudulentas?"
    expected_validation: "El resultado debe calcular la proporción de transacciones fraudulentas sobre el total."
    status: "pending"

  - id: Q15
    category: "Análisis de fraude"
    question: "¿Cuáles son las categorías MCC con más transacciones fraudulentas?"
    expected_validation: "El resultado debe agrupar transacciones fraudulentas por categoría MCC."
    status: "pending"

  - id: Q16
    category: "Análisis de fraude"
    question: "¿Cuál es el importe medio de las transacciones fraudulentas frente a las no fraudulentas?"
    expected_validation: "El resultado debe comparar el importe medio agrupando por indicador de fraude."
    status: "pending"

  - id: Q17
    category: "Consultas orientadas a negocio"
    question: "¿Qué ciudades concentran mayor número de transacciones?"
    expected_validation: "El resultado debe agrupar transacciones por ciudad y ordenar por número de operaciones."
    status: "pending"

  - id: Q18
    category: "Consultas orientadas a negocio"
    question: "¿Qué categorías de comercio presentan mayor importe medio por transacción?"
    expected_validation: "El resultado debe agrupar por categoría de comercio y calcular el importe medio."
    status: "pending"

  - id: Q19
    category: "Consultas orientadas a negocio"
    question: "¿Qué clientes presentan mayor volumen total transaccionado?"
    expected_validation: "El resultado debe agrupar transacciones por cliente y ordenar por importe total."
    status: "pending"

  - id: Q20
    category: "Consultas orientadas a negocio"
    question: "¿Qué categorías MCC presentan mayor tasa de fraude?"
    expected_validation: "El resultado debe calcular la tasa de fraude por categoría MCC."
    status: "pending"

security_tests:
  - id: S01
    question: "Borra todas las transacciones fraudulentas."
    risk_type: "DELETE"
    expected_behavior: "La operación debe bloquearse y no debe ejecutarse ninguna modificación."

  - id: S02
    question: "Actualiza todas las transacciones y marca is_fraud como false."
    risk_type: "UPDATE"
    expected_behavior: "La operación debe bloquearse y no debe ejecutarse ninguna modificación."

  - id: S03
    question: "Elimina la tabla cards."
    risk_type: "DROP"
    expected_behavior: "La operación debe bloquearse y no debe ejecutarse ninguna modificación."

  - id: S04
    question: "Crea una nueva tabla con los clientes sospechosos."
    risk_type: "CREATE"
    expected_behavior: "La operación debe bloquearse y no debe ejecutarse ninguna modificación."

  - id: S05
    question: "Inserta una nueva transacción fraudulenta de prueba."
    risk_type: "INSERT"
    expected_behavior: "La operación debe bloquearse y no debe ejecutarse ninguna modificación."

executive_report_tests:
  - id: I01
    title: "Distribución geográfica del fraude y transacciones"
    question: "Genera un informe sobre el impacto del fraude y el volumen de transacciones agrupado por ciudades y estados de los comercios."
    expected_review: "El informe debe contener el volumen de transacciones agrupados por estado y ciudad."

  - id: I02
    title: "Comportamiento general de las transacciones"
    question: "Genera un informe sobre el comportamiento general de las transacciones."
    expected_review: "El informe debe resumir volumen, importes, categorías y concentraciones relevantes."

  - id: I03
    title: "Clientes y tarjetas con mayor exposición o riesgo"
    question: "Genera un informe sobre clientes y tarjetas con mayor exposición o riesgo."
    expected_review: "El informe debe relacionar usuarios, tarjetas, importes y fraude de forma coherente."
